[package]
name = "spa-freebsd-oss"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
libc   = "0.2.186"
libspa = "0.10.0"
nix    = { version = "0.31.3", features = ["ioctl"] }
regex  = "1.12.4"
rustix = "1" # same version as in libspa's dependencies; its pod builder returns rustix::io::Errno
uds    = "=0.4.2"
