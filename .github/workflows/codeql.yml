name: CodeQL

# Rust CodeQL uses build mode "none": it extracts every workspace source,
# including the FreeBSD-only plugin, without requiring a FreeBSD sysroot.
# Compilation, tests, and clippy run separately in ci.yml on Ubuntu and FreeBSD.
on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Weekly backstop for newly published queries / advisory-adjacent rules.
    - cron: "17 5 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze-workspace-sources:
    name: Analyze (rust workspace, sources)
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          # This is the only build mode supported for Rust. It covers the
          # FreeBSD-only plugin crate even though it cannot build on Linux.
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"
