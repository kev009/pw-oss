name: CI

# pushes to master and all PRs; branch pushes get their run from the PR
# event alone, not twice
on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  core:
    name: Ubuntu core and fake backend
    runs-on: ubuntu-26.04
    timeout-minutes: 20
    env:
      RUSTUP_TOOLCHAIN: "1.96.0"
    steps:
      - uses: actions/checkout@v7
      - name: Install the workspace MSRV
        run: rustup toolchain install "$RUSTUP_TOOLCHAIN" --profile minimal --component clippy,rustfmt
      - name: Install SPA build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libclang-dev libpipewire-0.3-dev pkg-config
      - name: Toolchain versions
        run: |
          rustc --version
          cargo --version
          pkg-config --modversion libspa-0.2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint the portable core and fake backend
        run: cargo clippy --locked -p spa-kitchen-sink-core --all-targets --features test-support -- -D warnings
      - name: Test the portable core and fake backend
        run: cargo test --locked -p spa-kitchen-sink-core --all-targets --features test-support
      - name: Build the portable core at the workspace MSRV
        run: cargo build --locked -p spa-kitchen-sink-core --release --features test-support

  freebsd:
    name: FreeBSD ${{ matrix.release }} build and test
    runs-on: ubuntu-26.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # 15.1 deliberately exercises the timer fallback. Re-enable 16.0
          # when vmactions/freebsd-vm publishes conf/16.0.conf and its image;
          # that kernel carries enriched OSS sound kevents.
          - release: "15.1"
            enriched_kqueue: "0"
          # - release: "16.0"
          #   enriched_kqueue: "1"
    steps:
      - uses: actions/checkout@v7
      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.release }}
          usesh: true
          mem: 4096
          # pkgconf for libspa-sys's pkg-config probe; pipewire for the native
          # libspa it links against; llvm19 for the libclang bindgen needs
          # (mirroring the port's build deps)
          prepare: |
            pkg install -y pkgconf rust pipewire llvm19
            service devd onestatus || service devd onestart
            kldstat -q -m snd_dummy || kldload snd_dummy
            test -e /dev/dsp.dummy
          run: |
            set -eu
            export LIBCLANG_PATH=/usr/local/llvm19/lib
            export CARGO_TERM_COLOR=always
            export RUST_BACKTRACE=1
            export PW_OSS_EXPECT_ENRICHED_KQUEUE=${{ matrix.enriched_kqueue }}

            echo "==> rustc / cargo"
            rustc --version
            cargo --version
            echo "==> FreeBSD / snd_dummy"
            uname -a
            sysctl -n kern.osreldate
            ls -l /dev/dsp.dummy

            # Fail fast on style before spending time on builds.
            echo "==> cargo fmt --all --check"
            cargo fmt --all -- --check

            # Clippy before tests: same compile work, clearer signal on nits.
            echo "==> cargo clippy --locked --workspace --all-targets -D warnings"
            cargo clippy --locked --workspace --all-targets -- -D warnings

            # Catch cfg(debug_assertions) differences before the artifact build.
            echo "==> cargo clippy --locked --workspace --release --all-targets -D warnings"
            cargo clippy --locked --workspace --release --all-targets -- -D warnings

            # Explicit release artifact (ports / SPA plugin consumers care).
            echo "==> cargo build --locked --workspace --release"
            cargo build --locked --workspace --release

            echo "==> cargo test --locked --workspace"
            cargo test --locked --workspace

            # Print and enforce the native-header comparison separately so
            # ABI coverage is visible in the job log even when all tests pass.
            echo "==> FreeBSD OSS C/Rust ABI comparison"
            cargo test --locked -p spa-kitchen-sink-freebsd-oss freebsd_oss::abi::tests::c_and_rust_abi_match -- --exact --nocapture

            # Real kernel PCM and SPA-factory coverage without physical audio
            # hardware: format/duplex geometry, queue/xrun recovery, devd and
            # module hotplug, and node processing. Route probing is read-only;
            # these tests perform no mixer writes.
            echo "==> snd_dummy kernel integration"
            cargo test --locked -p spa-kitchen-sink-freebsd-oss freebsd_oss::native_tests:: -- --ignored --nocapture --test-threads=1

            # Optimized path: timing / DLL / wake logic can differ under -O.
            echo "==> cargo test --locked --workspace --release --all-targets"
            cargo test --locked --workspace --release --all-targets
